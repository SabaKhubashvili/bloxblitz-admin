
name: bloxblitz-prod

services:
  admin-api:
    build:
      context: .
      dockerfile: admin-api/Dockerfile
      target: production
    init: true
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      PORT: ${ADMIN_API_PORT:-4005}
    volumes:
      # Optional: Postgres CA PEM (default path /app/certs/db_cert/db_cert.crt — see DATABASE_SSL_CA_PATH)
      - ./certs/db_cert:/app/certs/db_cert:ro
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api}
    init: true
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api}
      ADMIN_API_INTERNAL_URL: ${ADMIN_API_INTERNAL_URL:-http://admin-api:4005}
      PORT: ${WEB_PORT:-4006}
      # DATABASE_URL from `env_file: .env.prod`
    depends_on:
      - admin-api
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - admin-api
    networks:
      - app

networks:
  app:
    driver: bridge
