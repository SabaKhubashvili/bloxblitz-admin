# Main NGINX configuration.
# Install: /etc/nginx/nginx.conf
#
# Modular includes (order matters: Cloudflare real IP → security → vhosts):
#   /etc/nginx/conf.d/cloudflare.conf
#   /etc/nginx/conf.d/security.conf
#   /etc/nginx/conf.d/admin.conf
#   /etc/nginx/conf.d/admin-api.conf

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Default Docker nofile limit is often 1024; higher values warn at startup.
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # $remote_addr reflects the visitor after Cloudflare real_ip (see cloudflare.conf).
    # $realip_remote_addr is the direct TCP peer (Cloudflare edge or bypass attempt).
    log_format main '$realip_remote_addr $remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_cf_ray"';

    access_log /var/log/nginx/access.log main;

    # Throughput / latency
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 4096;
    server_tokens off;

    keepalive_timeout 65s;
    keepalive_requests 10000;

    # Larger headers (long cookies, CF headers)
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    open_file_cache max=10000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_errors on;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-opentype
        application/x-font-truetype
        application/x-font-ttf
        application/x-javascript
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/opentype
        font/otf
        image/bmp
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml;

    include /etc/nginx/conf.d/cloudflare.conf;
    include /etc/nginx/conf.d/security.conf;
    include /etc/nginx/conf.d/admin.conf;
    include /etc/nginx/conf.d/admin-api.conf;
}
