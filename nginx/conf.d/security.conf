# Global security: methods, headers, body size, rate limits, TLS defaults.
# Install: /etc/nginx/conf.d/security.conf
# Included from http { } (after cloudflare.conf so $is_cloudflare_proxy exists).

# -----------------------------------------------------------------------------
# Cloudflare + IP gate: TCP peer must be CF ($is_cloudflare_proxy) AND
# restored visitor IP ($remote_addr) must be allowlisted.
# Replace YOUR_IP_1 / YOUR_IP_2 / … with real public IPs (IPv4 or IPv6).
# Add more lines:   203.0.113.50 1;   or   2001:db8::1 1;
# Remove lines you do not use (invalid literals will make `nginx -t` fail).
# -----------------------------------------------------------------------------
map $remote_addr $is_admin_allowlisted {
    default 0;
    5.152.117.106 1;
    95.137.189.183 1;
}

map "$is_cloudflare_proxy$is_admin_allowlisted" $reject_admin_access {
    default 1;
    11      0;
}

# -----------------------------------------------------------------------------
# HTTP methods (strict). Map used by each vhost: if ($blocked_method) return 405;
# -----------------------------------------------------------------------------
map $request_method $blocked_method {
    GET     0;
    POST    0;
    PUT     0;
    DELETE  0;
    OPTIONS 0;
    default 1;
}

# -----------------------------------------------------------------------------
# Request body size (tune per app; stricter on API via admin-api.conf override)
# -----------------------------------------------------------------------------
client_max_body_size 25m;
client_body_buffer_size 128k;

# -----------------------------------------------------------------------------
# Rate limiting zones ($binary_remote_addr = visitor after real_ip when trusted)
# -----------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=admin_web_rl:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=admin_api_rl:10m rate=8r/s;
limit_req_status 429;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_conn_status 429;

# -----------------------------------------------------------------------------
# TLS (origin certificate: Cloudflare Full or Full (strict))
# -----------------------------------------------------------------------------
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;

# Security headers are set per vhost (HTTPS) to avoid duplicate/conflicting add_header inheritance.
