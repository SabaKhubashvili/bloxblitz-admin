# Admin API — https://admin-api.bloxblitz.com
# Install: /etc/nginx/conf.d/admin-api.conf
#
# Docker: resolver + variable proxy_pass (see admin.conf). Port must match ADMIN_API_PORT (default 4005).

# -----------------------------------------------------------------------------
# HTTP — ACME + redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin-api.bloxblitz.com;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        if ($reject_admin_access) {
            return 403;
        }
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — NestJS API behind Cloudflare + strict IP allowlist
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin-api.bloxblitz.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10m;

    # --- Cloudflare edge + visitor IP allowlist ---
    if ($reject_admin_access) {
        return 403;
    }

    if ($blocked_method) {
        return 405;
    }

    limit_conn conn_per_ip 20;
    limit_req zone=admin_api_rl burst=20 nodelay;

    location ~* ^/(?:\.git|\.env|\.svn|\.hg|vendor/phpunit|wp-admin|wp-login|xmlrpc\.php|phpmyadmin|pma)(?:/|$) {
        return 444;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        limit_req zone=admin_api_rl burst=20 nodelay;
        set $upstream_api http://admin-api:4005;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        # Real visitor IP (post real_ip) — single trusted hop from CF; do not forward client XFF
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
    }
}
