# Admin panel — https://admin.bloxblitz.com
# Install: /etc/nginx/conf.d/admin.conf
#
# Docker: uses embedded DNS (127.0.0.11) + variable proxy_pass so `web` resolves at
# request time (avoids "host not found in upstream" at startup). WEB_PORT must match (default 4006).
# Bare metal: replace http://web:4006 with http://127.0.0.1:PORT and remove the resolver line.

# -----------------------------------------------------------------------------
# HTTP — ACME + redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.bloxblitz.com;

    # HTTP-01 hits the origin directly from Let's Encrypt — do not apply Cloudflare/IP gate here.
    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        if ($reject_admin_access) {
            return 403;
        }
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — Next.js (or static) behind Cloudflare + strict IP allowlist
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.bloxblitz.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Docker Compose embedded DNS (required for variable proxy_pass to service names)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Cloudflare edge + visitor IP allowlist (see security.conf maps) ---
    if ($reject_admin_access) {
        return 403;
    }

    # --- Global checks from security.conf maps ---
    if ($blocked_method) {
        return 405;
    }

    limit_conn conn_per_ip 50;
    limit_req zone=admin_web_rl burst=40 nodelay;

    # Obvious scanner paths (extend cautiously)
    location ~* ^/(?:\.git|\.env|\.svn|\.hg|vendor/phpunit|wp-admin|wp-login|xmlrpc\.php|phpmyadmin|pma)(?:/|$) {
        return 444;
    }

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Next.js immutable build assets — long browser cache
    location ^~ /_next/static/ {
        limit_req zone=admin_web_rl burst=80 nodelay;
        set $upstream_web http://web:4006;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering on;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Application
    location / {
        limit_req zone=admin_web_rl burst=40 nodelay;
        set $upstream_web http://web:4006;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering on;
    }
}
