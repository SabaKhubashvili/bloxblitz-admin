# Local development stack for BloxBlitz Admin (Nest admin-api + Next web).
# Requires external network `bloxblitz-network` (shared DB/Redis, etc.):
#   docker network create bloxblitz-network
# Copy/env: `.env.dev` (see repo docs). Ports overridable via ADMIN_API_PUBLISH_PORT, WEB_PUBLISH_PORT, etc.
#
# Production-style images: build with `--target production` on each Dockerfile and run without dev volumes
# (use a separate override file or CI/CD compose if you need that in-repo).

name: bloxblitz-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  admin-api:
    build:
      context: .
      dockerfile: admin-api/Dockerfile
      target: dev
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *default-logging
    env_file:
      - .env.dev
    environment:
      PORT: ${ADMIN_API_PORT:-4005}
      # Reach infra/redis service on bloxblitz-network (not resolvable from host machines).
      REDIS_HOST: redis
      # DATABASE_URL, REDIS_PASSWORD, JWT_SECRET, JWT_EXPIRES_IN, SMTP_*, etc. come from env_file.
      LOGIN_THROTTLE_LIMIT: ${LOGIN_THROTTLE_LIMIT:-5}
      LOGIN_THROTTLE_TTL_MS: ${LOGIN_THROTTLE_TTL_MS:-60000}
      LOGIN_THROTTLE_BLOCK_MS: ${LOGIN_THROTTLE_BLOCK_MS:-}
    ports:
      - "${ADMIN_API_PUBLISH_PORT:-4005}:${ADMIN_API_PORT:-4005}"
    volumes:
      # Host bind mount would overwrite image node_modules (wrong platform for sharp, etc.)
      - ./admin-api:/app
      - admin_api_node_modules:/app/node_modules
    networks:
      - app
      - bloxblitz-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(\"http\").get(\"http://127.0.0.1:\"+(process.env.PORT||\"4005\")+\"/health\",r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    command:
      - sh
      - -c
      - |
        set -e
        need_ci=0
        [ ! -f node_modules/.install-stamp ] && need_ci=1
        [ package-lock.json -nt node_modules/.install-stamp ] 2>/dev/null && need_ci=1
        if [ "$$need_ci" = 1 ]; then
          npm ci
          touch node_modules/.install-stamp
        fi
        npx prisma generate
        exec npm run start:dev

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *default-logging
    env_file:
      - .env.dev
    environment:
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-http://localhost:4005}
      ADMIN_API_INTERNAL_URL: ${ADMIN_API_INTERNAL_URL:-http://admin-api:4005}
      # DATABASE_URL: from `env_file: .env.dev` (do not override with empty `${DATABASE_URL}`).
    ports:
      - "${WEB_PUBLISH_PORT:-4006}:4006"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
      - ./admin-api/prisma:/app/prisma:ro
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(\"http\").get(\"http://127.0.0.1:4006/health\",r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    command:
      - sh
      - -c
      - |
        set -e
        pin_lightningcss_native() {
          [ -f node_modules/lightningcss/package.json ] || return 0
          ver=$$(node -p "require('./node_modules/lightningcss/package.json').version")
          case "$$(uname -m)" in
            aarch64|arm64) npm install "lightningcss-linux-arm64-gnu@$${ver}" --no-save ;;
            x86_64|amd64) npm install "lightningcss-linux-x64-gnu@$${ver}" --no-save ;;
            *) ;;
          esac
        }
        need_ci=0
        [ ! -f node_modules/.install-stamp ] && need_ci=1
        [ package-lock.json -nt node_modules/.install-stamp ] 2>/dev/null && need_ci=1
        if [ "$$need_ci" = 1 ]; then
          npm ci
          touch node_modules/.install-stamp
          pin_lightningcss_native
        fi
        if ! node -e "require('lightningcss')" 2>/dev/null; then
          pin_lightningcss_native
        fi
        if ! node -e "require('lightningcss')" 2>/dev/null; then
          echo "lightningcss: retrying npm ci + native binding..."
          npm ci
          touch node_modules/.install-stamp
          pin_lightningcss_native
        fi
        npx prisma generate --schema=./prisma/schema.prisma
        exec npm run dev -- --hostname 0.0.0.0 --port 4006

networks:
  app:
    driver: bridge
  bloxblitz-network:
    external: true

volumes:
  admin_api_node_modules:
  web_node_modules:
  web_next:
